<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PeakFuel Macro Calculator</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {font-family: Inter; background:#0f131a; color:#fff; margin:0}
    .container {max-width:900px; margin:40px auto; padding:20px}
    h1 {text-align:center}

    .grid {display:grid; grid-template-columns:repeat(2,1fr); gap:12px}
    @media(max-width:700px){.grid{grid-template-columns:1fr}}

    input, select {
      width:100%; padding:10px; border-radius:8px;
      border:1px solid #333; background:#111; color:#fff;
    }

    button {
      padding:12px; border:none; border-radius:10px;
      background:#4CAF50; color:white; cursor:pointer;
      font-weight:600;
    }

    .result {
      margin-top:20px;
      padding:15px;
      background:#111;
      border-radius:10px;
      border:1px solid #333;
    }

    .chips {display:flex; flex-wrap:wrap; gap:10px}
    .chip {
      background:#1a1f2a;
      padding:8px 12px;
      border-radius:20px;
    }

    .note {margin-top:10px; color:#aaa; font-size:13px}
  </style>
</head>

<body>
<div class="container">
  <h1>Macro & Calorie Calculator</h1>

  <div class="grid">
    <select id="sex">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <input id="age" type="number" placeholder="Age" value="25">
    <input id="height" type="number" placeholder="Height (cm)" value="170">
    <input id="weight" type="number" placeholder="Weight (kg)" value="70">

    <select id="activity">
      <option value="1.2">Sedentary</option>
      <option value="1.375">Light</option>
      <option value="1.55" selected>Moderate</option>
      <option value="1.725">Very Active</option>
    </select>

    <select id="goal">
      <option value="cut">Cut</option>
      <option value="maintain" selected>Maintain</option>
      <option value="bulk">Bulk</option>
    </select>
  </div>

  <br>
  <button onclick="calc()">Calculate</button>

  <div id="result" class="result" style="display:none;"></div>
</div>

<script>
function calc(){
  const sex = document.getElementById('sex').value;
  const age = +document.getElementById('age').value;
  const height = +document.getElementById('height').value;
  const weight = +document.getElementById('weight').value;
  const activity = +document.getElementById('activity').value;
  const goal = document.getElementById('goal').value;

  // ✅ Validation
  if (!age || !height || !weight) {
    alert("Please fill all fields properly");
    return;
  }

  // ✅ BMR with IF BLOCK
  let bmr;

  if (sex === 'male') {
    bmr = (10 * weight) + (6.25 * height) - (5 * age) + 5;
  } else {
    bmr = (10 * weight) + (6.25 * height) - (5 * age) - 161;
  }

  const baseTdee = bmr * activity;
  let tdee = baseTdee;

  // Goal adjustment
  if (goal === 'cut') tdee *= 0.85;
  if (goal === 'bulk') tdee *= 1.10;

  const totalCalories = Math.round(tdee);

  // ✅ Goal-based macros
  let protein_g, fat_g, carbs_g, strategy;

  if (goal === 'cut') {
    protein_g = Math.round(2.2 * weight);
    fat_g = Math.round(0.7 * weight);
    strategy = "High protein (fat loss & muscle retention)";
  } 
  else if (goal === 'bulk') {
    protein_g = Math.round(1.6 * weight);
    fat_g = Math.round(0.9 * weight);
    strategy = "Higher carbs (muscle gain & energy)";
  } 
  else {
    protein_g = Math.round(1.8 * weight);
    fat_g = Math.round(0.8 * weight);
    strategy = "Balanced macros (maintenance)";
  }

  const protein_cal = protein_g * 4;
  const fat_cal = fat_g * 9;

  const remaining_cal = totalCalories - (protein_cal + fat_cal);
  carbs_g = Math.round(remaining_cal / 4);

  // ✅ Output
  const res = document.getElementById('result');
  res.style.display = 'block';

  res.innerHTML = `
    <div class="chips">
      <div class="chip">BMR: ${Math.round(bmr)} kcal</div>
      <div class="chip">TDEE: ${Math.round(baseTdee)} kcal</div>
      <div class="chip">Target: ${totalCalories} kcal</div>
    </div>

    <br>

    <div class="chips">
      <div class="chip">Protein: ${protein_g} g</div>
      <div class="chip">Carbs: ${carbs_g} g</div>
      <div class="chip">Fat: ${fat_g} g</div>
    </div>

    <p class="note">Strategy: ${strategy}</p>
  `;
}
</script>
</body>
</html>
